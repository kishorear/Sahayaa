<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="1600" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { 
      fill: #f8f9fa; 
      stroke: #333; 
      stroke-width: 2;
      rx: 5;
      ry: 5;
    }
    .component { 
      fill: #ffffff; 
      stroke: #666; 
      stroke-width: 1;
      rx: 3;
      ry: 3;
    }
    .sectionTitle { 
      font-family: Arial, sans-serif; 
      font-size: 20px; 
      font-weight: bold;
      text-anchor: middle;
    }
    .componentText { 
      font-family: Arial, sans-serif; 
      font-size: 14px; 
      text-anchor: middle;
    }
    .arrow {
      stroke: #666;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .dashed {
      stroke-dasharray: 5,5;
    }
  </style>
  
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>
  
  <rect width="100%" height="100%" fill="#ffffff" />
  
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="28" font-weight="bold" text-anchor="middle">AI-Powered Support Ticket System Architecture</text>
  
  <!-- Client Layer -->
  <rect x="40" y="100" width="300" height="300" class="box" />
  <text x="190" y="130" class="sectionTitle">Client Layer</text>
  
  <rect x="70" y="150" width="240" height="40" class="component" />
  <text x="190" y="175" class="componentText">Customer Web UI</text>
  
  <rect x="70" y="200" width="240" height="40" class="component" />
  <text x="190" y="225" class="componentText">Embedded Chat Widget</text>
  
  <rect x="70" y="250" width="240" height="40" class="component" />
  <text x="190" y="275" class="componentText">Email Interface</text>
  
  <rect x="70" y="300" width="240" height="40" class="component" />
  <text x="190" y="325" class="componentText">Admin Dashboard</text>
  
  <!-- Authentication Layer -->
  <rect x="440" y="100" width="300" height="300" class="box" />
  <text x="590" y="130" class="sectionTitle">Authentication Layer</text>
  
  <rect x="470" y="150" width="240" height="40" class="component" />
  <text x="590" y="175" class="componentText">User Authentication</text>
  
  <rect x="470" y="200" width="240" height="40" class="component" />
  <text x="590" y="225" class="componentText">API Key Authentication</text>
  
  <rect x="470" y="250" width="240" height="40" class="component" />
  <text x="590" y="275" class="componentText">Session Management</text>
  
  <rect x="470" y="300" width="240" height="40" class="component" />
  <text x="590" y="325" class="componentText">MFA + SSO Services</text>
  
  <!-- Core Services -->
  <rect x="840" y="100" width="300" height="300" class="box" />
  <text x="990" y="130" class="sectionTitle">Core Services</text>
  
  <rect x="870" y="150" width="240" height="40" class="component" />
  <text x="990" y="175" class="componentText">Ticket Service</text>
  
  <rect x="870" y="200" width="240" height="40" class="component" />
  <text x="990" y="225" class="componentText">Chat Service</text>
  
  <rect x="870" y="250" width="240" height="40" class="component" />
  <text x="990" y="275" class="componentText">User Service</text>
  
  <rect x="870" y="300" width="240" height="40" class="component" />
  <text x="990" y="325" class="componentText">Tenant Service</text>
  
  <!-- AI Engine -->
  <rect x="40" y="450" width="300" height="350" class="box" />
  <text x="190" y="480" class="sectionTitle">AI Engine</text>
  
  <rect x="70" y="500" width="240" height="40" class="component" />
  <text x="190" y="525" class="componentText">AI Provider Factory</text>
  
  <rect x="70" y="550" width="240" height="40" class="component" />
  <text x="190" y="575" class="componentText">OpenAI Provider</text>
  
  <rect x="70" y="600" width="240" height="40" class="component" />
  <text x="190" y="625" class="componentText">Gemini Provider</text>
  
  <rect x="70" y="650" width="240" height="40" class="component" />
  <text x="190" y="675" class="componentText">Anthropic Provider</text>
  
  <rect x="70" y="700" width="240" height="40" class="component" />
  <text x="190" y="725" class="componentText">AWS Bedrock Provider</text>
  
  <rect x="70" y="750" width="240" height="40" class="component" />
  <text x="190" y="775" class="componentText">Custom Provider</text>
  
  <!-- External Integrations -->
  <rect x="440" y="450" width="300" height="250" class="box" />
  <text x="590" y="480" class="sectionTitle">External Integrations</text>
  
  <rect x="470" y="500" width="240" height="40" class="component" />
  <text x="590" y="525" class="componentText">Zendesk</text>
  
  <rect x="470" y="550" width="240" height="40" class="component" />
  <text x="590" y="575" class="componentText">Jira</text>
  
  <rect x="470" y="600" width="240" height="40" class="component" />
  <text x="590" y="625" class="componentText">Email Service</text>
  
  <!-- Storage Layer -->
  <rect x="840" y="450" width="300" height="250" class="box" />
  <text x="990" y="480" class="sectionTitle">Storage Layer</text>
  
  <rect x="870" y="500" width="240" height="40" class="component" />
  <text x="990" y="525" class="componentText">PostgreSQL</text>
  
  <rect x="870" y="550" width="240" height="40" class="component" />
  <text x="990" y="575" class="componentText">Memory Fallback</text>
  
  <rect x="870" y="600" width="240" height="40" class="component" />
  <text x="990" y="625" class="componentText">Data Source Cache</text>
  
  <!-- Knowledge Sources -->
  <rect x="40" y="850" width="300" height="220" class="box" />
  <text x="190" y="880" class="sectionTitle">Knowledge Sources</text>
  
  <rect x="70" y="900" width="240" height="40" class="component" />
  <text x="190" y="925" class="componentText">Knowledge Base</text>
  
  <rect x="70" y="950" width="240" height="40" class="component" />
  <text x="190" y="975" class="componentText">URL Content</text>
  
  <rect x="70" y="1000" width="240" height="40" class="component" />
  <text x="190" y="1025" class="componentText">Custom Data Sources</text>
  
  <!-- Multi-Tenant Support -->
  <rect x="840" y="850" width="300" height="220" class="box" />
  <text x="990" y="880" class="sectionTitle">Multi-Tenant Support</text>
  
  <rect x="870" y="900" width="240" height="40" class="component" />
  <text x="990" y="925" class="componentText">Tenant Settings</text>
  
  <rect x="870" y="950" width="240" height="40" class="component" />
  <text x="990" y="975" class="componentText">Branding/Theme</text>
  
  <rect x="870" y="1000" width="240" height="40" class="component" />
  <text x="990" y="1025" class="componentText">Domain Configuration</text>
  
  <!-- Process Flow Section -->
  <text x="600" y="1120" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">Process Flow: Ticket Handling</text>
  
  <!-- Flow diagram in the center -->
  <rect x="150" y="1150" width="900" height="400" rx="5" ry="5" fill="#f8f9fa" stroke="#ddd" stroke-width="1" />
  
  <!-- Flow Steps -->
  <rect x="430" y="1180" width="140" height="40" rx="20" ry="20" fill="#e3f2fd" stroke="#90caf9" stroke-width="1" />
  <text x="500" y="1205" class="componentText">User Query</text>
  
  <rect x="430" y="1260" width="140" height="40" rx="20" ry="20" fill="#e3f2fd" stroke="#90caf9" stroke-width="1" />
  <text x="500" y="1285" class="componentText">API Gateway</text>
  
  <rect x="430" y="1340" width="140" height="40" rx="20" ry="20" fill="#e3f2fd" stroke="#90caf9" stroke-width="1" />
  <text x="500" y="1365" class="componentText">AI Classification</text>
  
  <rect x="280" y="1420" width="140" height="40" rx="20" ry="20" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1" />
  <text x="350" y="1445" class="componentText">Auto-resolve</text>
  
  <rect x="580" y="1420" width="140" height="40" rx="20" ry="20" fill="#fce4ec" stroke="#f48fb1" stroke-width="1" />
  <text x="650" y="1445" class="componentText">Human Support</text>
  
  <rect x="280" y="1500" width="140" height="40" rx="20" ry="20" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1" />
  <text x="350" y="1525" class="componentText">Notify User</text>
  
  <rect x="580" y="1500" width="140" height="40" rx="20" ry="20" fill="#fce4ec" stroke="#f48fb1" stroke-width="1" />
  <text x="650" y="1525" class="componentText">Notify User</text>
  
  <!-- Flow Arrows -->
  <path d="M500,1220 L500,1260" class="arrow" />
  <path d="M500,1300 L500,1340" class="arrow" />
  <path d="M430,1360 L350,1420" class="arrow" />
  <path d="M570,1360 L650,1420" class="arrow" />
  <path d="M350,1460 L350,1500" class="arrow" />
  <path d="M650,1460 L650,1500" class="arrow" />
  
  <!-- Connecting Arrows -->
  <!-- Client to Authentication -->
  <path d="M340,250 L440,250" class="arrow" />
  
  <!-- Authentication to Core -->
  <path d="M740,250 L840,250" class="arrow" />
  
  <!-- Client to AI Engine -->
  <path d="M190,400 L190,450" class="arrow" />
  
  <!-- Core to Storage -->
  <path d="M990,400 L990,450" class="arrow" />
  
  <!-- AI to Knowledge -->
  <path d="M190,800 L190,850" class="arrow" />
  
  <!-- Storage to Multi-tenant -->
  <path d="M990,700 L990,850" class="arrow" />
  
  <!-- AI to External -->
  <path d="M340,520 L440,520" class="arrow" />
</svg>