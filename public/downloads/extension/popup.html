<!DOCTYPE html>
<html>
<head>
  <title>SupportAI Widget</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 320px;
      padding: 15px;
      background-color: #f9f9f9;
    }
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .logo {
      width: 40px;
      height: 40px;
      margin-right: 10px;
    }
    h1 {
      font-size: 18px;
      margin: 0;
      color: #333;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 500;
      color: #555;
    }
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input[type="color"] {
      height: 40px;
    }
    .status {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }
    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 8px;
    }
    .active {
      background-color: #4CAF50;
    }
    .inactive {
      background-color: #F44336;
    }
    .button-group {
      display: flex;
      gap: 10px;
    }
    button {
      background-color: #6366F1;
      color: white;
      border: none;
      padding: 10px 16px;
      text-align: center;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      flex: 1;
    }
    button:hover {
      background-color: #4F46E5;
    }
    button.secondary {
      background-color: #9CA3AF;
    }
    button.secondary:hover {
      background-color: #6B7280;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 46px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 34px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #6366F1;
    }
    input:checked + .slider:before {
      transform: translateX(22px);
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="SupportAI Logo" class="logo">
    <h1>SupportAI Chat Widget</h1>
  </div>
  
  <div class="status">
    <div id="status-indicator" class="status-indicator inactive"></div>
    <span id="status-text">Widget is inactive on this site</span>
  </div>
  
  <div class="form-group">
    <label for="tenant-id">Tenant ID:</label>
    <input type="text" id="tenant-id" placeholder="Enter your tenant ID">
  </div>
  
  <div class="form-group">
    <label for="api-key">API Key:</label>
    <input type="text" id="api-key" placeholder="Enter your API key">
  </div>
  
  <div class="form-group">
    <label for="primary-color">Primary Color:</label>
    <input type="color" id="primary-color" value="#6366F1">
  </div>
  
  <div class="form-group">
    <label for="position">Widget Position:</label>
    <select id="position">
      <option value="right">Bottom Right</option>
      <option value="left">Bottom Left</option>
    </select>
  </div>
  
  <div class="toggle-row">
    <label for="auto-open">Auto-open on page load:</label>
    <label class="switch">
      <input type="checkbox" id="auto-open">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="toggle-row">
    <label for="branding">Show SupportAI branding:</label>
    <label class="switch">
      <input type="checkbox" id="branding" checked>
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="button-group">
    <button id="activate">Activate on This Site</button>
    <button id="deactivate" class="secondary">Deactivate</button>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
