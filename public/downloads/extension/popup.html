<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SupportAI Chat Widget</title>
  <style>
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      margin: 0;
      padding: 16px;
      color: #333;
    }
    
    .header {
      display: flex;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }
    
    .header img {
      width: 24px;
      height: 24px;
      margin-right: 8px;
    }
    
    .header h1 {
      font-size: 18px;
      margin: 0;
      color: #6366F1;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      font-weight: 500;
    }
    
    input, select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
    
    input[type="color"] {
      height: 40px;
    }
    
    .buttons {
      display: flex;
      justify-content: space-between;
    }
    
    button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    button.primary {
      background-color: #6366F1;
      color: white;
    }
    
    button.secondary {
      background-color: #e5e7eb;
      color: #374151;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    .status {
      margin-top: 16px;
      padding: 8px;
      border-radius: 4px;
      font-size: 14px;
      text-align: center;
    }
    
    .success {
      background-color: #d1fae5;
      color: #065f46;
    }
    
    .error {
      background-color: #fee2e2;
      color: #b91c1c;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="Logo">
    <h1>SupportAI Chat Widget</h1>
  </div>
  
  <form id="configForm">
    <div class="form-group">
      <label for="tenantId">Tenant ID</label>
      <input type="text" id="tenantId" name="tenantId" placeholder="Enter your tenant ID">
    </div>
    
    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input type="text" id="apiKey" name="apiKey" placeholder="Enter your API key">
    </div>
    
    <div class="form-group">
      <label for="primaryColor">Widget Color</label>
      <input type="color" id="primaryColor" name="primaryColor" value="#6366F1">
    </div>
    
    <div class="form-group">
      <label for="position">Widget Position</label>
      <select id="position" name="position">
        <option value="right">Right</option>
        <option value="left">Left</option>
      </select>
    </div>
    
    <div class="buttons">
      <button type="submit" class="primary">Save & Apply</button>
      <button type="button" id="injectButton" class="secondary">Inject Widget</button>
    </div>
  </form>
  
  <div id="status" class="status hidden"></div>
  
  <script src="popup.js"></script>
</body>
</html>
